[build]
builder = "NIXPACKS"

# ── Backend service ───────────────────────────────────────────────────────────
# Set this file as the config for your BACKEND Railway service.
# For the frontend, set root directory to "frontend" and use the
# frontend/railway.toml (or configure via the Railway dashboard).

[deploy]
startCommand = "npm run db:migrate && npm run db:generate && npm run db:seed && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "teamflow-api"
